name: Build libwebrtc.a for Android (mediasoup)

on:
  workflow_dispatch:
    inputs:
      webrtc_branch:
        description: 'WebRTC branch (e.g., branch-heads/7339 for M140)'
        required: true
        default: 'branch-heads/7339'
      target_arch:
        description: 'Target architectures (comma-separated)'
        required: true
        default: 'armeabi-v7a,arm64-v8a'

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 180

    steps:
      - name: Detect WebRTC milestone
        id: version
        run: |
          BRANCH="${{ github.event.inputs.webrtc_branch }}"
          VERSION_RAW=$(curl -s "https://chromium.googlesource.com/chromium/src/+/${BRANCH}/chrome/VERSION?format=TEXT" | base64 -d)
          MAJOR=$(echo "$VERSION_RAW" | grep "MAJOR" | cut -d= -f2)
          MINOR=$(echo "$VERSION_RAW" | grep "MINOR" | cut -d= -f2)
          BUILD=$(echo "$VERSION_RAW" | grep "BUILD" | cut -d= -f2)
          PATCH=$(echo "$VERSION_RAW" | grep "PATCH" | cut -d= -f2)
          echo "milestone=M${MAJOR}" >> $GITHUB_OUTPUT
          echo "version=${MAJOR}.${MINOR}.${BUILD}.${PATCH}" >> $GITHUB_OUTPUT
          echo "WebRTC version: M${MAJOR} (${MAJOR}.${MINOR}.${BUILD}.${PATCH})"

      - name: Maximize disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache
          sudo rm -rf /usr/local/share/boost /usr/local/graalvm /usr/local/share/powershell
          sudo rm -rf /usr/local/share/chromium /usr/local/lib/node_modules
          sudo docker system prune -af || true
          sudo apt-get clean && sudo apt-get autoclean
          echo "Disk space after cleanup:"
          df -h /

      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq git python3 curl build-essential ccache \
            pkg-config libglib2.0-dev libgtk-3-dev lsb-release rsync

      - name: Setup depot_tools
        run: |
          git clone https://chromium.googlesource.com/chromium/tools/depot_tools.git
          echo "$PWD/depot_tools" >> $GITHUB_PATH
          export PATH=$PWD/depot_tools:$PATH
          # Bootstrap depot_tools fully
          ./depot_tools/ensure_bootstrap
          gclient --version
          echo "DEPOT_TOOLS_UPDATE=0" >> $GITHUB_ENV

      - name: Fetch WebRTC source
        run: |
          mkdir webrtc-build && cd webrtc-build
          fetch --nohooks webrtc_android
          gclient sync --no-history --nohooks --revision src@${{ github.event.inputs.webrtc_branch }} --delete_unversioned_trees --jobs=4
          echo "Disk after fetch:"
          df -h /

      - name: Run hooks and install Android build deps
        run: |
          # gclient runhooks must run from the directory containing .gclient
          cd webrtc-build
          gclient runhooks
          # Install Linux build dependencies
          cd src
          ./build/install-build-deps.sh --no-prompt --no-chromeos-fonts || true
          # Install Android-specific dependencies
          if [ -f ./build/install-build-deps-android.sh ]; then
            ./build/install-build-deps-android.sh || true
          fi

      - name: Patch thin archives for compatibility
        run: |
          cd webrtc-build/src
          # Disable thin archives to produce portable .a files
          sed -i 's/arflags = \[ "-T" \]/# arflags = [ "-T" ] # Disabled for portable .a/' build/config/BUILD.gn || true

      - name: Build libwebrtc.a for each ABI
        run: |
          cd webrtc-build/src

          # Ensure depot_tools python is available for gn's exec_script() calls
          export PATH=${{ github.workspace }}/depot_tools:$PATH
          export DEPOT_TOOLS_UPDATE=0
          export VPYTHON_BYPASS="manually managed python not in path"

          # Create vpython3 symlink if depot_tools one is broken
          if ! command -v vpython3 &>/dev/null; then
            sudo ln -sf $(which python3) /usr/local/bin/vpython3
          fi

          # Re-bootstrap depot_tools if needed
          ${{ github.workspace }}/depot_tools/ensure_bootstrap || true

          # Use WebRTC's bundled gn binary directly
          GN=$(pwd)/buildtools/linux64/gn
          NINJA=$(which ninja || echo "$(pwd)/third_party/ninja/ninja")
          echo "Using gn: $GN"
          echo "Using ninja: $NINJA"
          echo "vpython3: $(which vpython3)"
          echo "python3: $(which python3)"
          $GN --version

          IFS=',' read -ra ARCHS <<< "${{ github.event.inputs.target_arch }}"

          for ARCH in "${ARCHS[@]}"; do
            ARCH=$(echo "$ARCH" | xargs)
            echo "========================================="
            echo "Building for $ARCH"
            echo "========================================="

            # Map ABI to GN target_cpu
            case "$ARCH" in
              arm64-v8a)   TARGET_CPU="arm64" ;;
              armeabi-v7a) TARGET_CPU="arm" ;;
              x86_64)      TARGET_CPU="x64" ;;
              x86)         TARGET_CPU="x86" ;;
              *) echo "Unknown arch: $ARCH"; exit 1 ;;
            esac

            # Generate build using bundled gn
            $GN gen "out/$ARCH" --args="
              target_os=\"android\"
              target_cpu=\"$TARGET_CPU\"
              android_ndk_api_level=23
              is_debug=false
              is_component_build=false
              is_clang=true
              rtc_include_tests=false
              rtc_build_examples=false
              rtc_use_h264=true
              rtc_enable_protobuf=false
              use_custom_libcxx=false
              use_rtti=true
              use_errorprone_java_compiler=false
              treat_warnings_as_errors=false
              symbol_level=0
              android_static_analysis=\"off\"
            "

            # Build static library
            $NINJA -C "out/$ARCH" webrtc

            echo "Built: out/$ARCH/obj/libwebrtc.a"
            ls -lh "out/$ARCH/obj/libwebrtc.a"
            echo "Disk after $ARCH build:"
            df -h /
          done

      - name: Package artifacts
        run: |
          cd webrtc-build/src
          MILESTONE="${{ steps.version.outputs.milestone }}"
          VERSION="${{ steps.version.outputs.version }}"

          mkdir -p /tmp/libwebrtc-android-${MILESTONE}

          IFS=',' read -ra ARCHS <<< "${{ github.event.inputs.target_arch }}"
          for ARCH in "${ARCHS[@]}"; do
            ARCH=$(echo "$ARCH" | xargs)
            mkdir -p /tmp/libwebrtc-android-${MILESTONE}/lib/${ARCH}
            cp "out/${ARCH}/obj/libwebrtc.a" "/tmp/libwebrtc-android-${MILESTONE}/lib/${ARCH}/"
          done

          # Copy essential headers for mediasoup
          mkdir -p /tmp/libwebrtc-android-${MILESTONE}/include
          for DIR in api rtc_base p2p pc media modules call common_video logging system_wrappers; do
            rsync -a --include='*/' --include='*.h' --include='*.hpp' --exclude='*' \
              ${DIR}/ /tmp/libwebrtc-android-${MILESTONE}/include/${DIR}/ 2>/dev/null || true
          done
          rsync -a --include='*/' --include='*.h' --include='*.hpp' --exclude='*' \
            sdk/android/ /tmp/libwebrtc-android-${MILESTONE}/include/sdk/android/ 2>/dev/null || true
          rsync -a --include='*/' --include='*.h' --include='*.hpp' --exclude='*' \
            third_party/abseil-cpp/ /tmp/libwebrtc-android-${MILESTONE}/include/third_party/abseil-cpp/ 2>/dev/null || true

          # Write build info
          cat > /tmp/libwebrtc-android-${MILESTONE}/README.md << 'READMEEOF'
          # libwebrtc for Android (static library)
          Built for mediasoup integration.
          READMEEOF

          echo "Branch: ${{ github.event.inputs.webrtc_branch }}" >> /tmp/libwebrtc-android-${MILESTONE}/README.md
          echo "Version: ${VERSION}" >> /tmp/libwebrtc-android-${MILESTONE}/README.md
          echo "Architectures: ${{ github.event.inputs.target_arch }}" >> /tmp/libwebrtc-android-${MILESTONE}/README.md

          # Create tarball
          cd /tmp
          tar czf libwebrtc-android-${MILESTONE}.tar.gz libwebrtc-android-${MILESTONE}/
          sha256sum libwebrtc-android-${MILESTONE}.tar.gz > libwebrtc-android-${MILESTONE}.tar.gz.sha256
          ls -lh libwebrtc-android-${MILESTONE}.tar.gz

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: libwebrtc-android-${{ steps.version.outputs.milestone }}
          path: /tmp/libwebrtc-android-${{ steps.version.outputs.milestone }}.tar.gz*
          retention-days: 90

      - name: Upload individual .a files
        uses: actions/upload-artifact@v4
        with:
          name: libwebrtc-static-libs
          path: |
            webrtc-build/src/out/*/obj/libwebrtc.a
          retention-days: 90
