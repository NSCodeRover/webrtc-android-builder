name: Build libwebrtc.a for Android (mediasoup)

on:
  workflow_dispatch:
    inputs:
      webrtc_branch:
        description: 'WebRTC branch (e.g., branch-heads/7339 for M140)'
        required: true
        default: 'branch-heads/7339'
      target_arch:
        description: 'Target architectures (comma-separated)'
        required: true
        default: 'armeabi-v7a,arm64-v8a'

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Detect WebRTC milestone
        id: version
        run: |
          BRANCH="${{ github.event.inputs.webrtc_branch }}"
          VERSION_RAW=$(curl -s "https://chromium.googlesource.com/chromium/src/+/${BRANCH}/chrome/VERSION?format=TEXT" | base64 -d)
          MAJOR=$(echo "$VERSION_RAW" | grep "MAJOR" | cut -d= -f2)
          MINOR=$(echo "$VERSION_RAW" | grep "MINOR" | cut -d= -f2)
          BUILD=$(echo "$VERSION_RAW" | grep "BUILD" | cut -d= -f2)
          PATCH=$(echo "$VERSION_RAW" | grep "PATCH" | cut -d= -f2)
          echo "milestone=M${MAJOR}" >> $GITHUB_OUTPUT
          echo "version=${MAJOR}.${MINOR}.${BUILD}.${PATCH}" >> $GITHUB_OUTPUT
          echo "WebRTC version: M${MAJOR} (${MAJOR}.${MINOR}.${BUILD}.${PATCH})"

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache
          sudo docker system prune -af || true
          df -h /

      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq git python3 curl build-essential ccache \
            pkg-config libglib2.0-dev libgtk-3-dev lsb-release

      - name: Setup depot_tools
        run: |
          git clone https://chromium.googlesource.com/chromium/tools/depot_tools.git
          echo "$PWD/depot_tools" >> $GITHUB_PATH
          export PATH=$PWD/depot_tools:$PATH
          ./depot_tools/ensure_bootstrap
          echo "GYP_DEFINES=OS=android" >> $GITHUB_ENV

      - name: Fetch WebRTC source
        run: |
          mkdir webrtc-build && cd webrtc-build
          fetch --nohooks webrtc_android
          gclient sync --no-history --revision src@${{ github.event.inputs.webrtc_branch }} --delete_unversioned_trees --jobs=4

      - name: Install WebRTC build deps
        run: |
          cd webrtc-build/src
          ./build/install-build-deps.sh --no-prompt --no-chromeos-fonts --android

      - name: Build libwebrtc.a for each ABI
        run: |
          cd webrtc-build/src
          IFS=',' read -ra ARCHS <<< "${{ github.event.inputs.target_arch }}"

          for ARCH in "${ARCHS[@]}"; do
            ARCH=$(echo "$ARCH" | xargs)
            echo "========================================="
            echo "Building for $ARCH"
            echo "========================================="

            # Map ABI to GN target_cpu
            case "$ARCH" in
              arm64-v8a)   TARGET_CPU="arm64" ;;
              armeabi-v7a) TARGET_CPU="arm" ;;
              x86_64)      TARGET_CPU="x64" ;;
              x86)         TARGET_CPU="x86" ;;
              *) echo "Unknown arch: $ARCH"; exit 1 ;;
            esac

            # Generate build
            gn gen "out/$ARCH" --args="
              target_os=\"android\"
              target_cpu=\"$TARGET_CPU\"
              is_debug=false
              is_component_build=false
              is_clang=true
              rtc_include_tests=false
              rtc_build_examples=false
              rtc_use_h264=true
              rtc_enable_protobuf=false
              use_custom_libcxx=false
              use_rtti=true
              use_errorprone_java_compiler=false
              treat_warnings_as_errors=false
              symbol_level=0
              android_static_analysis=\"off\"
            "

            # Build static library
            ninja -C "out/$ARCH" webrtc

            echo "Built: out/$ARCH/obj/libwebrtc.a"
            ls -lh "out/$ARCH/obj/libwebrtc.a"
          done

      - name: Build libwebrtc.jar
        run: |
          cd webrtc-build/src
          # Build Java bindings JAR
          ninja -C "out/arm64-v8a" sdk/android:libwebrtc || true
          find out/ -name "*.jar" | head -10

      - name: Package artifacts
        run: |
          cd webrtc-build/src
          MILESTONE="${{ steps.version.outputs.milestone }}"
          VERSION="${{ steps.version.outputs.version }}"

          mkdir -p /tmp/libwebrtc-android-${MILESTONE}

          IFS=',' read -ra ARCHS <<< "${{ github.event.inputs.target_arch }}"
          for ARCH in "${ARCHS[@]}"; do
            ARCH=$(echo "$ARCH" | xargs)
            mkdir -p /tmp/libwebrtc-android-${MILESTONE}/lib/${ARCH}
            cp "out/${ARCH}/obj/libwebrtc.a" "/tmp/libwebrtc-android-${MILESTONE}/lib/${ARCH}/"
          done

          # Copy JAR if built
          JAR=$(find out/ -name "lib.java*.jar" -o -name "libwebrtc.jar" | head -1)
          if [ -n "$JAR" ]; then
            cp "$JAR" "/tmp/libwebrtc-android-${MILESTONE}/lib/libwebrtc.jar"
          fi

          # Copy essential headers
          mkdir -p /tmp/libwebrtc-android-${MILESTONE}/include
          rsync -a --include='*/' --include='*.h' --include='*.hpp' --exclude='*' \
            api/ /tmp/libwebrtc-android-${MILESTONE}/include/api/
          rsync -a --include='*/' --include='*.h' --include='*.hpp' --exclude='*' \
            rtc_base/ /tmp/libwebrtc-android-${MILESTONE}/include/rtc_base/
          rsync -a --include='*/' --include='*.h' --include='*.hpp' --exclude='*' \
            p2p/ /tmp/libwebrtc-android-${MILESTONE}/include/p2p/
          rsync -a --include='*/' --include='*.h' --include='*.hpp' --exclude='*' \
            pc/ /tmp/libwebrtc-android-${MILESTONE}/include/pc/
          rsync -a --include='*/' --include='*.h' --include='*.hpp' --exclude='*' \
            media/ /tmp/libwebrtc-android-${MILESTONE}/include/media/
          rsync -a --include='*/' --include='*.h' --include='*.hpp' --exclude='*' \
            modules/ /tmp/libwebrtc-android-${MILESTONE}/include/modules/
          rsync -a --include='*/' --include='*.h' --include='*.hpp' --exclude='*' \
            sdk/android/ /tmp/libwebrtc-android-${MILESTONE}/include/sdk/android/
          rsync -a --include='*/' --include='*.h' --include='*.hpp' --exclude='*' \
            call/ /tmp/libwebrtc-android-${MILESTONE}/include/call/
          rsync -a --include='*/' --include='*.h' --include='*.hpp' --exclude='*' \
            common_video/ /tmp/libwebrtc-android-${MILESTONE}/include/common_video/
          rsync -a --include='*/' --include='*.h' --include='*.hpp' --exclude='*' \
            logging/ /tmp/libwebrtc-android-${MILESTONE}/include/logging/
          rsync -a --include='*/' --include='*.h' --include='*.hpp' --exclude='*' \
            system_wrappers/ /tmp/libwebrtc-android-${MILESTONE}/include/system_wrappers/
          rsync -a --include='*/' --include='*.h' --include='*.hpp' --exclude='*' \
            third_party/abseil-cpp/ /tmp/libwebrtc-android-${MILESTONE}/include/third_party/abseil-cpp/

          # Write build info
          cat > /tmp/libwebrtc-android-${MILESTONE}/README.md << EOF
          # libwebrtc ${MILESTONE} for Android (static library)

          Branch: ${{ github.event.inputs.webrtc_branch }}
          Version: ${VERSION}
          Architectures: ${{ github.event.inputs.target_arch }}
          Built: $(date -u +"%Y-%m-%d %H:%M UTC")

          ## GN args
          target_os="android", is_debug=false, is_component_build=false,
          is_clang=true, rtc_include_tests=false, rtc_use_h264=true,
          use_rtti=true, use_custom_libcxx=false

          ## Usage with mediasoup
          Copy lib/{ABI}/libwebrtc.a to deps/webrtc/lib/{ABI}/
          Copy include/ to deps/webrtc/src/
          EOF

          # Create tarball
          cd /tmp
          tar czf libwebrtc-android-${MILESTONE}.tar.gz libwebrtc-android-${MILESTONE}/
          sha256sum libwebrtc-android-${MILESTONE}.tar.gz > libwebrtc-android-${MILESTONE}.tar.gz.sha256
          ls -lh libwebrtc-android-${MILESTONE}.tar.gz

      - name: Upload libwebrtc.a artifacts
        uses: actions/upload-artifact@v4
        with:
          name: libwebrtc-android-${{ steps.version.outputs.milestone }}
          path: /tmp/libwebrtc-android-${{ steps.version.outputs.milestone }}.tar.gz*
          retention-days: 90

      - name: Upload individual .a files
        uses: actions/upload-artifact@v4
        with:
          name: libwebrtc-static-libs
          path: |
            webrtc-build/src/out/*/obj/libwebrtc.a
          retention-days: 90
