name: Build libwebrtc.a for Android (mediasoup)

on:
  workflow_dispatch:
    inputs:
      webrtc_branch:
        description: 'WebRTC branch (e.g., branch-heads/7339 for M140)'
        required: true
        default: 'branch-heads/7339'
      target_arch:
        description: 'Target architectures (comma-separated)'
        required: true
        default: 'armeabi-v7a,arm64-v8a'

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 180

    steps:
      - name: Detect WebRTC milestone
        id: version
        run: |
          BRANCH="${{ github.event.inputs.webrtc_branch }}"
          VERSION_RAW=$(curl -s "https://chromium.googlesource.com/chromium/src/+/${BRANCH}/chrome/VERSION?format=TEXT" | base64 -d)
          MAJOR=$(echo "$VERSION_RAW" | grep "MAJOR" | cut -d= -f2)
          MINOR=$(echo "$VERSION_RAW" | grep "MINOR" | cut -d= -f2)
          BUILD=$(echo "$VERSION_RAW" | grep "BUILD" | cut -d= -f2)
          PATCH=$(echo "$VERSION_RAW" | grep "PATCH" | cut -d= -f2)
          echo "milestone=M${MAJOR}" >> $GITHUB_OUTPUT
          echo "version=${MAJOR}.${MINOR}.${BUILD}.${PATCH}" >> $GITHUB_OUTPUT
          echo "WebRTC version: M${MAJOR} (${MAJOR}.${MINOR}.${BUILD}.${PATCH})"

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache
          sudo rm -rf /usr/local/share/boost /usr/local/graalvm /usr/local/share/powershell
          sudo rm -rf /usr/local/share/chromium /usr/local/lib/node_modules
          sudo docker system prune -af || true
          sudo apt-get clean
          df -h /

      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq git python3 curl build-essential \
            pkg-config libglib2.0-dev libgtk-3-dev lsb-release rsync ninja-build

      - name: Setup depot_tools
        run: |
          git clone https://chromium.googlesource.com/chromium/tools/depot_tools.git
          export PATH=${{ github.workspace }}/depot_tools:$PATH

          # Force bootstrap and verify
          cd depot_tools
          ./ensure_bootstrap || true

          # If python3_bin_reldir.txt is missing, create it manually
          if [ ! -f python3_bin_reldir.txt ]; then
            echo "python3_bin_reldir.txt missing after bootstrap — creating manually"
            PYTHON3_PATH=$(which python3)
            PYTHON3_DIR=$(dirname "$PYTHON3_PATH")
            echo "$PYTHON3_DIR" > python3_bin_reldir.txt
            ln -sf "$PYTHON3_PATH" python3
            echo "Created python3_bin_reldir.txt pointing to: $(cat python3_bin_reldir.txt)"
          fi

          cat python3_bin_reldir.txt
          ls -la python3_bin_reldir.txt
          cd ..

          # Verify gn works
          depot_tools/gn --version

          echo "${{ github.workspace }}/depot_tools" >> $GITHUB_PATH
          echo "DEPOT_TOOLS_UPDATE=0" >> $GITHUB_ENV

      - name: Fetch and sync WebRTC source
        run: |
          mkdir webrtc-build && cd webrtc-build
          fetch --nohooks webrtc_android
          cd src
          git checkout -b build_branch refs/remotes/branch-heads/${{ github.event.inputs.webrtc_branch == 'branch-heads/7339' && '7339' || '7339' }}
          cd ..
          gclient sync --delete_unversioned_trees --jobs=4 --verbose
          df -h /

      - name: Install WebRTC build deps
        run: |
          cd webrtc-build/src
          ./build/install-build-deps.sh --no-prompt || true

      - name: Patch for mediasoup compatibility
        run: |
          cd webrtc-build/src
          # Disable thin archives for portable .a files
          sed -i 's/arflags = \[ "-T" \]/# arflags = [ "-T" ]/' build/config/BUILD.gn || true

      - name: Build libwebrtc.a for each ABI
        run: |
          cd webrtc-build/src
          IFS=',' read -ra ARCHS <<< "${{ github.event.inputs.target_arch }}"

          for ARCH in "${ARCHS[@]}"; do
            ARCH=$(echo "$ARCH" | xargs)
            echo "========================================="
            echo "Building for $ARCH"
            echo "========================================="

            case "$ARCH" in
              arm64-v8a)   TARGET_CPU="arm64" ;;
              armeabi-v7a) TARGET_CPU="arm" ;;
              x86_64)      TARGET_CPU="x64" ;;
              x86)         TARGET_CPU="x86" ;;
              *) echo "Unknown arch: $ARCH"; exit 1 ;;
            esac

            BUILD_ARGS="target_os=\"android\" target_cpu=\"$TARGET_CPU\" android_ndk_api_level=23 is_debug=false is_component_build=false is_clang=true rtc_include_tests=false rtc_build_examples=false rtc_use_h264=true rtc_enable_protobuf=false use_custom_libcxx=false use_rtti=true use_errorprone_java_compiler=false treat_warnings_as_errors=false symbol_level=0 android_static_analysis=\"off\""

            gn gen "out/$ARCH" --args="$BUILD_ARGS"
            ninja -C "out/$ARCH" webrtc

            echo "Built: out/$ARCH/obj/libwebrtc.a"
            ls -lh "out/$ARCH/obj/libwebrtc.a"
            df -h /
          done

      - name: Package artifacts
        run: |
          cd webrtc-build/src
          MILESTONE="${{ steps.version.outputs.milestone }}"

          mkdir -p /tmp/libwebrtc-android-${MILESTONE}

          IFS=',' read -ra ARCHS <<< "${{ github.event.inputs.target_arch }}"
          for ARCH in "${ARCHS[@]}"; do
            ARCH=$(echo "$ARCH" | xargs)
            mkdir -p /tmp/libwebrtc-android-${MILESTONE}/lib/${ARCH}
            cp "out/${ARCH}/obj/libwebrtc.a" "/tmp/libwebrtc-android-${MILESTONE}/lib/${ARCH}/"
          done

          # Copy headers for mediasoup
          mkdir -p /tmp/libwebrtc-android-${MILESTONE}/include
          for DIR in api rtc_base p2p pc media modules call common_video logging system_wrappers; do
            rsync -a --include='*/' --include='*.h' --include='*.hpp' --exclude='*' \
              ${DIR}/ /tmp/libwebrtc-android-${MILESTONE}/include/${DIR}/ 2>/dev/null || true
          done
          rsync -a --include='*/' --include='*.h' --include='*.hpp' --exclude='*' \
            sdk/android/ /tmp/libwebrtc-android-${MILESTONE}/include/sdk/android/ 2>/dev/null || true
          rsync -a --include='*/' --include='*.h' --include='*.hpp' --exclude='*' \
            third_party/abseil-cpp/ /tmp/libwebrtc-android-${MILESTONE}/include/third_party/abseil-cpp/ 2>/dev/null || true

          cd /tmp
          tar czf libwebrtc-android-${MILESTONE}.tar.gz libwebrtc-android-${MILESTONE}/
          ls -lh libwebrtc-android-${MILESTONE}.tar.gz

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: libwebrtc-android-${{ steps.version.outputs.milestone }}
          path: /tmp/libwebrtc-android-${{ steps.version.outputs.milestone }}.tar.gz
          retention-days: 90

      - name: Upload individual .a files
        uses: actions/upload-artifact@v4
        with:
          name: libwebrtc-static-libs
          path: |
            webrtc-build/src/out/*/obj/libwebrtc.a
          retention-days: 90
