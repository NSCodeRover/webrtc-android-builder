name: Build libwebrtc.a for Android (mediasoup)

on:
  workflow_dispatch:
    inputs:
      webrtc_branch:
        description: 'WebRTC branch (e.g., branch-heads/7339 for M140)'
        required: true
        default: 'branch-heads/7339'
      target_arch:
        description: 'Target architectures (comma-separated)'
        required: true
        default: 'armeabi-v7a,arm64-v8a'

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 180

    steps:
      - name: Detect version
        id: version
        run: |
          BRANCH="${{ github.event.inputs.webrtc_branch }}"
          VERSION_RAW=$(curl -s "https://chromium.googlesource.com/chromium/src/+/${BRANCH}/chrome/VERSION?format=TEXT" | base64 -d)
          MAJOR=$(echo "$VERSION_RAW" | grep "MAJOR" | cut -d= -f2)
          echo "milestone=M${MAJOR}" >> $GITHUB_OUTPUT
          echo "Building WebRTC M${MAJOR}"

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache
          sudo rm -rf /usr/local/share/boost /usr/local/graalvm /usr/local/share/powershell
          sudo rm -rf /usr/local/share/chromium /usr/local/lib/node_modules
          sudo docker system prune -af 2>/dev/null || true
          sudo apt-get clean
          df -h /

      - name: Install deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq git python3 curl build-essential \
            pkg-config libglib2.0-dev libgtk-3-dev lsb-release ninja-build

      - name: Setup depot_tools
        run: |
          git clone https://chromium.googlesource.com/chromium/tools/depot_tools.git
          echo "${{ github.workspace }}/depot_tools" >> $GITHUB_PATH
          echo "DEPOT_TOOLS_UPDATE=0" >> $GITHUB_ENV

      - name: Fetch WebRTC source
        run: |
          mkdir webrtc-build && cd webrtc-build
          fetch --nohooks webrtc_android
          BRANCH_NUM=$(echo "${{ github.event.inputs.webrtc_branch }}" | sed 's|branch-heads/||')
          cd src && git checkout -b build refs/remotes/branch-heads/${BRANCH_NUM} && cd ..
          gclient sync --delete_unversioned_trees --jobs=4
          df -h /

      - name: Install build deps
        run: |
          cd webrtc-build/src
          ./build/install-build-deps.sh --no-prompt || true

      - name: Patch for NDK compatibility
        run: |
          cd webrtc-build/src

          # 1. STL: force NDK libc++ (std::__ndk1::) not Chromium libc++ (std::__cr::)
          sed -i 's/use_custom_libcxx = true/use_custom_libcxx = false/' build/config/c++/BUILD.gn 2>/dev/null || true
          echo "Patch 1: STL → NDK libc++"

          # 1b. Disable thin archives — thin .a files are just path indexes, not portable
          sed -i 's/arflags = \[ "-T" \]/# arflags = [ "-T" ]/' build/config/compiler/BUILD.gn 2>/dev/null || true
          echo "Patch 1b: thin archives disabled"

          # 2. libunwind: fix _Unwind_Backtrace for .so link
          # Replace visibility to allow libunwind from build/config
          sed -i 's|visibility = \[ "//buildtools/third_party/libc++abi" \]|visibility = [ "//build/config:common_deps", "//buildtools/third_party/libc++", "//buildtools/third_party/libc++abi" ]|' buildtools/third_party/libunwind/BUILD.gn 2>/dev/null || true
          echo "Patch 2: libunwind visibility"

          # 3. Link libunwind when custom libcxx is disabled
          if ! grep -q "libunwind" build/config/BUILD.gn; then
            sed -i '/if (use_custom_libcxx) {/{n;/public_deps.*libc++/{n;s/}/} else {\n      public_deps += [ "\/\/buildtools\/third_party\/libunwind" ]\n    }/}}' build/config/BUILD.gn 2>/dev/null || true
          fi
          echo "Patch 3: link libunwind"

          # 4. Fix audio crash on devices reporting 0 Hz sample rate (OnePlus etc.)
          # Change RTC_CHECK to fallback instead of crash
          sed -i 's/RTC_CHECK(output_parameters->is_valid());/if (!output_parameters->is_valid()) { output_parameters->reset(48000, static_cast<size_t>(1), static_cast<size_t>(960)); }/' sdk/android/src/jni/audio_device/audio_device_module.cc 2>/dev/null || true
          sed -i 's/RTC_CHECK(input_parameters->is_valid());/if (!input_parameters->is_valid()) { input_parameters->reset(48000, static_cast<size_t>(1), static_cast<size_t>(960)); }/' sdk/android/src/jni/audio_device/audio_device_module.cc 2>/dev/null || true
          echo "Patch 4: audio 0 Hz fallback (OnePlus fix)"

          # 5. Create perfetto base stubs for symbols not built by WebRTC
          cat > /tmp/perfetto_stubs.cc << 'STUBEOF'
          #include <cstddef>
          #include <unistd.h>
          namespace perfetto { namespace base { namespace internal {
            size_t g_cached_page_size = 0;
            size_t GetSysPageSizeSlowpath() {
              long sz = sysconf(_SC_PAGESIZE);
              g_cached_page_size = (sz > 0) ? static_cast<size_t>(sz) : 4096;
              return g_cached_page_size;
            }
          }}}
          STUBEOF
          echo "Patch 5: perfetto base stubs"

          echo "All patches applied"

      - name: Build libwebrtc.a
        run: |
          cd webrtc-build/src

          EXTRA_GN_ARGS='is_debug=false is_component_build=false is_clang=true rtc_include_tests=false rtc_build_examples=false rtc_use_h264=true rtc_enable_protobuf=false use_custom_libcxx=false use_rtti=true treat_warnings_as_errors=false android_static_analysis="off" android_ndk_api_level=23 enable_libaom=false rtc_include_dav1d_in_internal_decoder_factory=false'

          IFS=',' read -ra ARCHS <<< "${{ github.event.inputs.target_arch }}"

          for ARCH in "${ARCHS[@]}"; do
            ARCH=$(echo "$ARCH" | xargs)
            echo "========================================="
            echo "Building $ARCH"
            echo "========================================="

            # build_aar.py now builds 'webrtc' target → produces obj/libwebrtc.a directly
            # No .so link, no _Unwind issue, no duplicate JNI_OnLoad
            # build_aar.py builds all submodules. The .so link fails (_Unwind) but
            # all individual .a files are built before that step.
            # Step A: build_aar.py for gn gen + partial compile (~3085 objects)
            python3 tools_webrtc/android/build_aar.py \
              --arch $ARCH \
              --build-dir out/build \
              --output /tmp/unused-${ARCH}.aar \
              --extra-gn-args "$EXTRA_GN_ARGS" || true

            # Step B: build remaining targets — build_aar.py uses siso, so use autoninja
            # (bare ninja rejects siso state files left by build_aar.py)
            rm -f "$(pwd)/out/build/$ARCH/.sisoenv" 2>/dev/null || true
            /usr/bin/ninja -C "$(pwd)/out/build/$ARCH" webrtc 2>/dev/null || true

            # Use ninja's libwebrtc.a directly — it already contains all objects
            echo "Copying ninja-built libwebrtc.a for $ARCH"
            ls -lh "$(pwd)/out/build/$ARCH/obj/libwebrtc.a"
            cp "out/build/$ARCH/obj/libwebrtc.a" "/tmp/libwebrtc-${ARCH}.a"

            # Clean build artifacts for disk space
            rm -rf "out/build/$ARCH/obj" "out/build/$ARCH/gen" "out/build/$ARCH/clang_x64" 2>/dev/null || true
            echo "$ARCH done — disk:"
            df -h /
          done

      - name: Package
        run: |
          cd webrtc-build/src
          MILESTONE="${{ steps.version.outputs.milestone }}"
          mkdir -p /tmp/pkg/lib

          IFS=',' read -ra ARCHS <<< "${{ github.event.inputs.target_arch }}"
          for ARCH in "${ARCHS[@]}"; do
            ARCH=$(echo "$ARCH" | xargs)
            mkdir -p "/tmp/pkg/lib/${ARCH}"
            cp "/tmp/libwebrtc-${ARCH}.a" "/tmp/pkg/lib/${ARCH}/libwebrtc.a"
            echo "Packaged $ARCH"
          done

          # Jar — build_aar.py produces libwebrtc.jar (M140 Java classes for JNI compat)
          JAR=$(find out/build -name "libwebrtc.jar" -type f 2>/dev/null | head -1)
          if [ -n "$JAR" ]; then
            cp "$JAR" /tmp/pkg/lib/libwebrtc.jar
            echo "Packaged libwebrtc.jar from $JAR"
          else
            echo "WARNING: libwebrtc.jar not found"
          fi

          # Headers
          mkdir -p /tmp/pkg/include
          for DIR in api rtc_base p2p pc media modules call common_video logging system_wrappers sdk/android third_party/abseil-cpp third_party/jni_zero; do
            if [ -d "$DIR" ]; then
              rsync -a --include='*/' --include='*.h' --include='*.hpp' --exclude='*' \
                "$DIR/" "/tmp/pkg/include/$DIR/" 2>/dev/null || true
            fi
          done

          cd /tmp && tar czf "libwebrtc-android-${MILESTONE}.tar.gz" pkg/
          ls -lh "libwebrtc-android-${MILESTONE}.tar.gz"

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: libwebrtc-android-${{ steps.version.outputs.milestone }}
          path: /tmp/libwebrtc-android-${{ steps.version.outputs.milestone }}.tar.gz
          retention-days: 90
